<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroRocket - Retrospectivas Modernas</title>
    <meta name="description"
        content="Una herramienta moderna y colaborativa para que equipos Scrum gestionen sus retrospectivas.">
    <meta name="keywords" content="retrospectivas, scrum, equipos, colaboración, sprint">
    <meta name="author" content="RetroRocket Team">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://retro-rocket.vercel.app/">
    <meta property="og:title" content="RetroRocket - Retrospectivas Modernas">
    <meta property="og:description"
        content="Una herramienta moderna y colaborativa para que equipos Scrum gestionen sus retrospectivas.">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://retro-rocket.vercel.app/">
    <meta property="twitter:title" content="RetroRocket - Retrospectivas Modernas">
    <meta property="twitter:description"
        content="Una herramienta moderna y colaborativa para que equipos Scrum gestionen sus retrospectivas.">

    <link rel="icon" type="image/svg+xml" href="/rocket.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!-- Apply the theme before first paint to avoid a flash of the wrong theme
         (WCAG 2.1 feature FR-011). Mirrors the logic in ThemeToggle. -->
    <script>
        (function () {
            try {
                var saved = localStorage.getItem('theme');
                var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (saved === 'dark' || (!saved && prefersDark)) {
                    document.documentElement.classList.add('dark');
                }
            } catch (e) { /* localStorage/matchMedia unavailable — default to light */ }
        })();
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
