name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: retro-rocket

jobs:
  checks:
    name: Type-check, lint, and test with coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: retro-rocket/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

  e2e:
    name: Playwright E2E (Firebase Emulator Suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: retro-rocket/package-lock.json

      # firebase-tools' Firestore Emulator requires a JDK (21+); ubuntu-latest runners
      # don't ship one new enough by default.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite against the Firebase Emulator Suite
        run: npm run e2e

  version:
    name: Automated Semantic Versioning
    runs-on: ubuntu-latest
    needs: [checks, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[version bump]')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for CodeQL
        uses: lewagon/wait-on-check-action@v1.8.1
        timeout-minutes: 15
        with:
          ref: ${{ github.sha }}
          check-name: 'CodeQL'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: retro-rocket/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity for the release commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
